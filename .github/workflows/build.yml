                        <i class="fa-solid fa-chevron-left text-[11px]"></i>
                    </button>
                    <button class="w-3.5 h-3.5 border-2 border-slate-500 hover:border-slate-300 rounded-full" onclick="emulatorSystemHome()">
                    </button>
