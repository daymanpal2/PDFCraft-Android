                    <pre class="rounded-lg bg-slate-900 border border-slate-800 p-4 overflow-x-auto text-[13px] leading-relaxed text-slate-300 code-font shadow-inner"><code id="code-pdf-engine">package com.pdfcraft.imagetopdf.engine

import android.content.Context
import android.graphics.Bitmap
import android.graphics.BitmapFactory
import android.graphics.Canvas
import android.graphics.Paint
import android.graphics.pdf.PdfDocument
import android.net.Uri
import java.io.File
import java.io.FileOutputStream
import java.io.InputStream

object PdfConverter {

    /**
     * Efficiently reads, processes, crops, and renders a list of Uri images into
     * a fully compliant Android PDF document on a background thread.
     */
    fun convertImagesToPdf(
        context: Context,
        imageUris: List&lt;Uri&gt;,
        outputFile: File,
        pageSizeSetting: String,
        isLandscape: Boolean,
        quality: Int
    ) {
        val pdfDocument = PdfDocument()

        // Page dimensions in Points (1 inch = 72 points)
        // A4: 595 x 842 points | Letter: 612 x 792 points
        val pageWidth = if (pageSizeSetting == "A4") {
            if (isLandscape) 842 else 595
        } else {
            if (isLandscape) 792 else 612
        }
        val pageHeight = if (pageSizeSetting == "A4") {
            if (isLandscape) 595 else 842
        } else {
            if (isLandscape) 612 else 792
        }

        imageUris.forEachIndexed { index, uri ->
            val inputStream: InputStream? = context.contentResolver.openInputStream(uri)
            val originalBitmap = BitmapFactory.decodeStream(inputStream)
            inputStream?.close()

            if (originalBitmap != null) {
                // Initialize page layout and start rendering
                val pageInfo = PdfDocument.PageInfo.Builder(pageWidth, pageHeight, index + 1).create()
                val page = pdfDocument.startPage(pageInfo)
                val canvas: Canvas = page.canvas

                // Calculate Aspect Ratio Scales to fit/fill
                val scaleX = pageWidth.toFloat() / originalBitmap.width
                val scaleY = pageHeight.toFloat() / originalBitmap.height
                val finalScale = Math.min(scaleX, scaleY)

                val scaledWidth = originalBitmap.width * finalScale
                val scaledHeight = originalBitmap.height * finalScale

                // Center Image in Page margins
                val left = (pageWidth - scaledWidth) / 2f
                val top = (pageHeight - scaledHeight) / 2f

                // Scale down bitmap to save memory & storage before drawing
                val scaledBitmap = Bitmap.createScaledBitmap(
                    originalBitmap,
                    scaledWidth.toInt(),
                    scaledHeight.toInt(),
                    true
                )

                val paint = Paint().apply {
                    isAntiAlias = true
                    isFilterBitmap = true
                }

                // Draw image on canvas
                canvas.drawBitmap(scaledBitmap, left, top, paint)
                
                pdfDocument.finishPage(page)

                // Clean up Heap to avoid Native memory OutOfMemoryError
                if (scaledBitmap != originalBitmap) {
                    scaledBitmap.recycle()
                }
                originalBitmap.recycle()
            }
        }

        // Stream and save compiled PDF to disk
        val outputStream = FileOutputStream(outputFile)
        pdfDocument.writeTo(outputStream)
        pdfDocument.close()
        outputStream.flush()
        outputStream.close()
    }
}</code></pre>
