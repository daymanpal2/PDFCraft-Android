    </main>

    <!-- Footer Meta Bar -->
    <footer class="bg-slate-950 border-t border-slate-800/80 px-6 py-3 flex flex-wrap justify-between items-center gap-3 text-xs text-slate-400 shrink-0">
        <div>
            Developed as an open-source template project using <span class="text-indigo-400 font-medium">Jetpack Compose UI</span> and <span class="text-indigo-400 font-medium">Kotlin</span>.
        </div>
        <div class="flex items-center gap-4">
            <a href="https://developer.android.com/reference/android/graphics/pdf/PdfDocument" target="_blank" class="hover:text-white transition-colors">Android PdfDocument API</a>
            <span>•</span>
            <span>Target SDK: 34 (Android 14)</span>
        </div>
    </footer>

    <!-- Interactive Javascript Logic Engine -->
    <script>
        // Tab switching controller
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('text-slate-400', 'hover:text-slate-200');
            });

            document.getElementById(`tab-content-${tabId}`).classList.remove('hidden');
            const targetBtn = document.getElementById(`tab-btn-${tabId}`);
            targetBtn.classList.remove('text-slate-400', 'hover:text-slate-200');
            targetBtn.classList.add('bg-indigo-600', 'text-white');
        }

        // Copy source code to clipboard
        function copyCode(elementId) {
            const codeText = document.getElementById(elementId).innerText;
            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = codeText;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            
            try {
                document.execCommand('copy');
                const toast = document.getElementById('copy-toast');
                toast.classList.remove('opacity-0', 'pointer-events-none');
                toast.classList.add('opacity-100');
                
                setTimeout(() => {
                    toast.classList.remove('opacity-100');
                    toast.classList.add('opacity-0', 'pointer-events-none');
                }, 2000);
            } catch (err) {
                console.error('Failed to copy code: ', err);
            } finally {
                document.body.removeChild(tempTextArea);
            }
        }

        // Live Clock logic for Android Emulator Top bar
        function updateEmulatorClock() {
            const clockEl = document.getElementById('android-clock');
            if (clockEl) {
                const now = new Date();
                let hours = now.getHours();
                let minutes = now.getMinutes();
                hours = hours < 10 ? '0' + hours : hours;
                minutes = minutes < 10 ? '0' + minutes : minutes;
                clockEl.textContent = `${hours}:${minutes}`;
            }
        }
        setInterval(updateEmulatorClock, 1000);
        updateEmulatorClock();

        /*
         * EMULATOR STATE MANAGEMENT & OPERATIONS
         */
        let userSelectedImages = []; // Stores objects: { id, name, size, rotation (0, 90, 180, 270), src }
        let generatedPdfBlobUrl = null;
        let generatedPdfFileName = "document.pdf";

        // Navigation Controllers
        function showScreen(screenId) {
            document.querySelectorAll('.screen-view').forEach(screen => screen.classList.add('hidden'));
            document.getElementById(`screen-${screenId}`).classList.remove('hidden');
        }

        function triggerFileAdd() {
            document.getElementById('emulator-file-picker').click();
        }

        function navBackToHome() {
            showScreen('home');
        }

        function navBackToArrange() {
            showScreen('arrange');
        }

        function emulatorSystemBack() {
            const homeVisible = !document.getElementById('screen-home').classList.contains('hidden');
            const arrangeVisible = !document.getElementById('screen-arrange').classList.contains('hidden');
            const previewVisible = !document.getElementById('screen-preview').classList.contains('hidden');

            if (previewVisible) {
                navBackToArrange();
            } else if (arrangeVisible) {
                navBackToHome();
            } else if (homeVisible) {
                showToast("Already on Home Screen");
            }
        }

        function emulatorSystemHome() {
            navBackToHome();
            closeSettingsSheet();
        }

        function showEmulatorRecentsToast() {
            showToast("Multi-tasking simulated");
        }

        // Toast Popup Trigger
        function showToast(message) {
            const toast = document.getElementById('toast-notif');
            toast.innerHTML = `<i class="fa-regular fa-bell mr-1"></i> ${message}`;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 2500);
        }

        // Bottom Settings Sheet toggler
        function openSettingsSheet() {
            const sheet = document.getElementById('bottom-sheet');
            sheet.classList.remove('translate-y-full');
        }

        function closeSettingsSheet() {
            const sheet = document.getElementById('bottom-sheet');
            sheet.classList.add('translate-y-full');
        }

        function toggleInfoBottomSheet() {
            const sheet = document.getElementById('info-bottom-sheet');
            if (sheet.classList.contains('translate-y-full')) {
                sheet.classList.remove('translate-y-full');
            } else {
                sheet.classList.add('translate-y-full');
            }
        }

        // Process file selections
        function handleImageSelection(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;

            let loadedCount = 0;
            const targetCount = files.length;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imgObj = {
                        id: 'img_' + Date.now() + '_' + Math.floor(Math.random() * 1000),
                        name: file.name,
                        size: (file.size / 1024).toFixed(1) + " KB",
                        rotation: 0,
                        src: e.target.result
                    };
                    userSelectedImages.push(imgObj);
                    loadedCount++;

                    if (loadedCount === targetCount) {
                        showToast(`Added ${targetCount} image(s)`);
                        renderArrangementGrid();
                        showScreen('arrange');
                    }
                };
                reader.readAsDataURL(file);
            }
            // Clear value to allow selecting same images again if deleted
            event.target.value = '';
        }

        // Preset Sandbox Sample Generator (SVGs rendered as inline data to keep asset lightweight)
        function loadSamplePresetImages() {
            const mockPresets = [
                {
                    name: 'invoice_template.png',
                    size: '142 KB',
                    color: '#c7d2fe',
                    textColor: '#312e81',
                    title: 'TAX INVOICE',
                    meta: 'INV-492003',
                    details: 'Client: Android Developer\nDate: May 31, 2026\nTotal: $1,200.00'
                },
                {
                    name: 'sketch_prototype.png',
                    size: '95 KB',
                    color: '#a7f3d0',
                    textColor: '#064e3b',
                    title: 'MOBILE WIREFRAME',
                    meta: 'Home Screen Prototype',
                    details: 'App Concept: PDFCraft\nUI Framework: Jetpack Compose\nState: Iteration 2'
                },
                {
                    name: 'cover_graphic.png',
                    size: '210 KB',
                    color: '#fef08a',
                    textColor: '#713f12',
                    title: 'PROJECT BRIEF',
                    meta: 'Image to PDF Engine',
                    details: 'Core Features:\n- Zero-Quality Loss Compression\n- A4 Canvas Auto-Fit\n- Multi-Threaded Execution'
                }
            ];

            const loadPromises = mockPresets.map(preset => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400;
                    canvas.height = 560;
                    const ctx = canvas.getContext('2d');

                    // Base background
                    ctx.fillStyle = preset.color;
                    ctx.fillRect(0, 0, 400, 560);

                    // Grid Pattern
                    ctx.strokeStyle = 'rgba(0,0,0,0.04)';
                    ctx.lineWidth = 1;
                    for (let x = 0; x < 400; x += 20) {
                        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 560); ctx.stroke();
                    }
                    for (let y = 0; y < 560; y += 20) {
                        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(400, y); ctx.stroke();
                    }

                    // Content Frame
                    ctx.strokeStyle = preset.textColor;
                    ctx.lineWidth = 4;
                    ctx.strokeRect(20, 20, 360, 520);

                    // Title Header
                    ctx.fillStyle = preset.textColor;
                    ctx.font = 'bold 24px Inter, sans-serif';
                    ctx.fillText(preset.title, 40, 70);

                    ctx.font = 'bold 12px monospace';
                    ctx.fillText(preset.meta, 40, 95);

                    // Separator line
                    ctx.strokeStyle = preset.textColor;
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(40, 115); ctx.lineTo(360, 115); ctx.stroke();

                    // Text Content Box
                    ctx.font = '14px Inter, sans-serif';
                    const lines = preset.details.split('\n');
                    let startY = 160;
                    lines.forEach(line => {
                        ctx.fillText(line, 40, startY);
                        startY += 30;
                    });

                    // Footer branding
                    ctx.font = 'bold 10px monospace';
                    ctx.fillText('Android App Mock Sandbox Graphics', 40, 510);

                    resolve({
                        id: 'preset_' + Date.now() + '_' + Math.floor(Math.random() * 1000),
                        name: preset.name,
                        size: preset.size,
                        rotation: 0,
                        src: canvas.toDataURL()
                    });
                });
            });

            Promise.all(loadPromises).then(results => {
                userSelectedImages = [...userSelectedImages, ...results];
                showToast("Sample presets generated");
                renderArrangementGrid();
                showScreen('arrange');
            });
        }

        // Render Current Image Set on Screen 2 (Arrangement Grid)
        function renderArrangementGrid() {
            const grid = document.getElementById('arrange-grid');
            const countEl = document.getElementById('arrange-count');
            grid.innerHTML = '';
            countEl.textContent = userSelectedImages.length;

            if (userSelectedImages.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-2 text-center py-12 text-slate-500 text-xs">
                        <i class="fa-regular fa-image text-3xl mb-2 block"></i>
                        No images loaded.
                    </div>
                `;
                return;
            }

            userSelectedImages.forEach((img, index) => {
                const card = document.createElement('div');
                card.className = "bg-slate-800 rounded-xl overflow-hidden relative border border-slate-700/60 p-1 flex flex-col justify-between";
                
                // Set custom rotation transformations
                let rotClass = "";
                if (img.rotation === 90) rotClass = "rotate-90";
                else if (img.rotation === 180) rotClass = "rotate-180";
                else if (img.rotation === 270) rotClass = "rotate-270";

                card.innerHTML = `
                    <div class="relative aspect-square rounded-lg overflow-hidden bg-slate-950/60 flex items-center justify-center">
                        <img src="${img.src}" class="max-h-full max-w-full object-contain transform transition-transform duration-200 ${rotClass}" alt="User Image">
                        <div class="absolute bottom-1 left-1 bg-slate-950/70 text-[8px] font-bold px-1.5 py-0.5 rounded text-slate-300">
                            #${index + 1}
                        </div>
                    </div>
                    
                    <!-- File Metadata -->
                    <div class="p-1.5 flex flex-col">
                        <span class="text-[9px] font-semibold text-slate-200 truncate w-full" title="${img.name}">${img.name}</span>
                        <span class="text-[8px] text-slate-400 mt-0.5">${img.size}</span>
                    </div>

                    <!-- Action Layer for this specific item -->
                    <div class="border-t border-slate-700/50 mt-1 pt-1.5 flex justify-between gap-1 text-[10px] text-slate-400 px-1">
                        <!-- Rotate control -->
                        <button onclick="rotateImage('${img.id}')" class="hover:text-indigo-400 flex items-center justify-center w-6 h-6 rounded-md bg-slate-950/40">
                            <i class="fa-solid fa-arrows-rotate"></i>
                        </button>
                        <!-- Move Left/Up -->
                        <button onclick="moveImageOrder('${img.id}', -1)" ${index === 0 ? 'disabled class="opacity-30"' : 'class="hover:text-indigo-400 flex items-center justify-center w-6 h-6 rounded-md bg-slate-950/40"'}>
                            <i class="fa-solid fa-arrow-left"></i>
                        </button>
                        <!-- Move Right/Down -->
                        <button onclick="moveImageOrder('${img.id}', 1)" ${index === userSelectedImages.length - 1 ? 'disabled class="opacity-30"' : 'class="hover:text-indigo-400 flex items-center justify-center w-6 h-6 rounded-md bg-slate-950/40"'}>
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                        <!-- Remove element -->
                        <button onclick="deleteImage('${img.id}')" class="hover:text-rose-400 flex items-center justify-center w-6 h-6 rounded-md bg-slate-950/40">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Mutator Operations on individual images
        function rotateImage(imgId) {
            const index = userSelectedImages.findIndex(x => x.id === imgId);
            if (index !== -1) {
                userSelectedImages[index].rotation = (userSelectedImages[index].rotation + 90) % 360;
                renderArrangementGrid();
                showToast("Rotated Image 90°");
            }
        }

        function deleteImage(imgId) {
            userSelectedImages = userSelectedImages.filter(x => x.id !== imgId);
            renderArrangementGrid();
            showToast("Removed Image");
            if (userSelectedImages.length === 0) {
                navBackToHome();
            }
        }

        function moveImageOrder(imgId, direction) {
            const index = userSelectedImages.findIndex(x => x.id === imgId);
            if (index === -1) return;

            const targetIndex = index + direction;
            if (targetIndex < 0 || targetIndex >= userSelectedImages.length) return;

            // Swap items
            const temp = userSelectedImages[index];
            userSelectedImages[index] = userSelectedImages[targetIndex];
            userSelectedImages[targetIndex] = temp;

            renderArrangementGrid();
        }

        /*
         * HIGH-PERFORMANCE CLIENT-SIDE PDF GENERATOR ENGINE
         * Mimics the logic written in PdfConverter.kt using jsPDF API
         */
        async function generatePdfAndPreview() {
            if (userSelectedImages.length === 0) {
                showToast("Select at least 1 image");
                return;
            }

            // Show simulated background thread compilation spinner
            const overlay = document.getElementById('processing-overlay');
            const statusText = document.getElementById('processing-status');
            overlay.classList.remove('hidden');

            statusText.innerText = "Loading Graphics...";
            await new Promise(r => setTimeout(r, 600));

            statusText.innerText = "Scaling Bitmaps...";
            await new Promise(r => setTimeout(r, 600));

            statusText.innerText = "Compiling PDF Elements...";
            
            try {
                const { jsPDF } = window.jspdf;
                
                // Get Settings
                const pageSizeSet = document.getElementById('setting-page-size').value;
                const marginSet = parseInt(document.getElementById('setting-page-margin').value);
                const qualityValue = parseInt(document.getElementById('setting-quality').value) / 100;

                // Configure standard dimension sizes
                let formatOpt = 'a4';
                let docWidth = 210;  // in mm
                let docHeight = 297; // in mm

                if (pageSizeSet === 'Letter') {
                    formatOpt = 'letter';
                    docWidth = 216;
                    docHeight = 279;
                }

                // Initialize document structure context
                let pdf;
                if (pageSizeSet === 'Fit') {
                    // Start first page with default letter layout, we will redefine width in render loop
                    pdf = new jsPDF({ orientation: 'p', unit: 'mm' });
                } else {
                    pdf = new jsPDF({
                        orientation: 'p',
                        unit: 'mm',
                        format: formatOpt
                    });
                }

                // Render loop across images
                for (let i = 0; i < userSelectedImages.length; i++) {
                    const imgData = userSelectedImages[i];
                    
                    // Create an Image instance to load pixel dimensions
                    const tempImgObj = new Image();
                    tempImgObj.src = imgData.src;
                    await new Promise((resolve) => { tempImgObj.onload = resolve; });

                    // Create Canvas to compute rotations
                    const rotCanvas = document.createElement('canvas');
                    const rotCtx = rotCanvas.getContext('2d');

                    if (imgData.rotation === 90 || imgData.rotation === 270) {
                        rotCanvas.width = tempImgObj.height;
                        rotCanvas.height = tempImgObj.width;
                    } else {
                        rotCanvas.width = tempImgObj.width;
                        rotCanvas.height = tempImgObj.height;
                    }

                    // Perform precise canvas graphics coordinate translations
                    rotCtx.translate(rotCanvas.width / 2, rotCanvas.height / 2);
                    rotCtx.rotate((imgData.rotation * Math.PI) / 180);
                    rotCtx.drawImage(tempImgObj, -tempImgObj.width / 2, -tempImgObj.height / 2);

                    // Re-capture processed visual source base64
                    const finalImgSrc = rotCanvas.toDataURL('image/jpeg', qualityValue);

                    // If 'Fit Size' mode selected, customize layout aspect dynamically
                    if (pageSizeSet === 'Fit') {
                        // Maintain ratio matching A4 reference width of 210mm
                        const scaleAspect = 210 / rotCanvas.width;
                        docWidth = 210;
                        docHeight = rotCanvas.height * scaleAspect;

                        if (i === 0) {
                            // Adjust layout margins of first frame
                            pdf = new jsPDF({
                                orientation: 'p',
                                unit: 'mm',
                                format: [docWidth, docHeight]
                            });
                        } else {
                            pdf.addPage([docWidth, docHeight], 'p');
                        }
                    } else {
                        // Standard formats (A4/Letter)
                        if (i > 0) pdf.addPage();
                    }

                    // Layout Dimensions Accounting for Settings margin
                    const contentWidth = docWidth - (marginSet * 2);
                    const contentHeight = docHeight - (marginSet * 2);

                    // Image Scale Logic: Keep aspect-ratio without stretching pixel maps
                    const imgAspect = rotCanvas.width / rotCanvas.height;
                    const pageAspect = contentWidth / contentHeight;

                    let targetWidth = contentWidth;
                    let targetHeight = contentHeight;

                    if (imgAspect > pageAspect) {
                        targetHeight = contentWidth / imgAspect;
                    } else {
                        targetWidth = contentHeight * imgAspect;
                    }

                    // Center inside the active page frame bounds
                    const finalX = marginSet + (contentWidth - targetWidth) / 2;
                    const finalY = marginSet + (contentHeight - targetHeight) / 2;

                    pdf.addImage(finalImgSrc, 'JPEG', finalX, finalY, targetWidth, targetHeight);
                }

                // Output compilation result
                const pdfBlob = pdf.output('blob');
                if (generatedPdfBlobUrl) {
                    URL.revokeObjectURL(generatedPdfBlobUrl);
                }
                generatedPdfBlobUrl = URL.createObjectURL(pdfBlob);
                
                // Configure dynamic preview files & metadata metrics
                generatedPdfFileName = `PDFCraft_${Date.now().toString().slice(-6)}.pdf`;
                document.getElementById('output-pdf-name').innerText = generatedPdfFileName;
                
                // Update format indicator badge
                document.getElementById('pdf-mock-badge-format').innerText = pageSizeSet === 'Fit' ? 'Fit Image' : pageSizeSet;
                document.getElementById('output-pdf-meta').innerText = `${pageSizeSet} Format • Margins: ${marginSet === 0 ? 'None' : marginSet + 'mm'} • ${userSelectedImages.length} Page(s)`;

                // Dynamic preview thumbnail (Uses first image as thumbnail background)
                document.getElementById('pdf-mock-thumbnail').src = userSelectedImages.src;

                // Close compiling loader
                overlay.classList.add('hidden');
                showScreen('preview');
                showToast("PDF Successfully Compiled");

            } catch (err) {
                console.error("PDF generation error: ", err);
                overlay.classList.add('hidden');
                showToast("Compilation Error: " + err.message);
            }
        }

        // Download actual compiled binary output directly inside Browser
        function triggerActualPdfDownload() {
            if (!generatedPdfBlobUrl) {
                showToast("No generated file found");
                return;
            }

            const downloadLink = document.createElement('a');
            downloadLink.href = generatedPdfBlobUrl;
            downloadLink.download = generatedPdfFileName;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            showToast("Downloading Output Document");
        }
    </script>
</body>
</html>
