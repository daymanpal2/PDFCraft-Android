class MainActivity : ComponentActivity() {
    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        setContent {
            MaterialTheme(colorScheme = darkColorScheme()) {
                ImageToPdfApp()
            }
        }
    }

    @OptIn(ExperimentalMaterial3Api::class)
    @Composable
    fun ImageToPdfApp() {
        val context = LocalContext.current
        var selectedImages by remember { mutableStateOf<List&lt;Uri&gt;>(emptyList()) }
        var isConverting by remember { mutableStateOf(false) }
        
        // Settings State
        var pageSize by remember { mutableStateOf("A4") }
        var isLandscape by remember { mutableStateOf(false) }
        var compressionQuality by remember { mutableFloatStateOf(80f) }

        val imagePickerLauncher = rememberLauncherForActivityResult(
            contract = ActivityResultContracts.GetMultipleContents()
        ) { uris ->
            if (uris.isNotEmpty()) {
                selectedImages = selectedImages + uris
            }
        }

        Scaffold(
            topBar = {
                TopAppBar(
                    title = { Text("PDFCraft - Image to PDF", fontWeight = FontWeight.Bold) },
                    colors = TopAppBarDefaults.topAppBarColors(containerColor = Color(0xFF1E1E2E))
                )
            },
            floatingActionButton = {
                if (selectedImages.isNotEmpty() && !isConverting) {
                    ExtendedFloatingActionButton(
                        onClick = {
                            isConverting = true
                            lifecycleScope.launch(Dispatchers.Default) {
                                try {
                                    val pdfFile = File(context.cacheDir, "Converted_${System.currentTimeMillis()}.pdf")
                                    PdfConverter.convertImagesToPdf(
                                        context = context,
                                        imageUris = selectedImages,
                                        outputFile = pdfFile,
                                        pageSizeSetting = pageSize,
                                        isLandscape = isLandscape,
                                        quality = compressionQuality.toInt()
                                    )
                                    withContext(Dispatchers.Main) {
                                        Toast.makeText(context, "PDF saved to: ${pdfFile.absolutePath}", Toast.LENGTH_LONG).show()
                                        isConverting = false
                                    }
                                } catch (e: Exception) {
                                    withContext(Dispatchers.Main) {
                                        Toast.makeText(context, "Error: ${e.message}", Toast.LENGTH_SHORT).show()
                                        isConverting = false
                                    }
                                }
                            }
                        },
                        containerColor = MaterialTheme.colorScheme.primaryContainer,
                        contentColor = MaterialTheme.colorScheme.onPrimaryContainer
                    ) {
                        Icon(Icons.Filled.Build, contentDescription = "Convert")
                        Spacer(Modifier.width(8.dp))
                        Text("Convert to PDF")
                    }
                }
            }
        ) { padding ->
            Column(
                modifier = Modifier
                    .fillMaxSize()
                    .padding(padding)
                    .background(Color(0xFF121214))
                    .padding(16.dp)
            ) {
                // Settings Section
                Card(
                    modifier = Modifier.fillMaxWidth().padding(bottom = 16.dp),
                    colors = CardDefaults.cardColors(containerColor = Color(0xFF1E1E2E))
                ) {
                    Column(modifier = Modifier.padding(16.dp)) {
                        Text("PDF Conversion Settings", fontWeight = FontWeight.Bold, color = Color.White)
                        Spacer(modifier = Modifier.height(8.dp))
                        
                        // Page Size Row
                        Row(
                            modifier = Modifier.fillMaxWidth(),
                            horizontalArrangement = Arrangement.SpaceBetween,
                            verticalAlignment = Alignment.CenterVertically
                        ) {
                            Text("Page Format", color = Color.Gray)
                            // Basic dropdown selector mockup for Compose UI
                            Button(onClick = { pageSize = if (pageSize == "A4") "Letter" else "A4" }) {
                                Text(pageSize)
                            }
                        }
                    }
                }

                // Image Grid Area
                if (selectedImages.isEmpty()) {
                    Box(
                        modifier = Modifier.fillMaxWidth().weight(1f),
                        contentAlignment = Alignment.Center
                    ) {
                        Button(onClick = { imagePickerLauncher.launch("image/*") }) {
                            Text("Select Images to Convert")
                        }
                    }
                } else {
                    LazyVerticalGrid(
                        columns = GridCells.Fixed(3),
                        modifier = Modifier.weight(1f),
                        horizontalArrangement = Arrangement.spacedBy(8.dp),
                        verticalArrangement = Arrangement.spacedBy(8.dp)
                    ) {
                        items(selectedImages) { uri ->
                            Box(modifier = Modifier.aspectRatio(1f).clip(RoundedCornerShape(8.dp))) {
                                AsyncImage(
                                    model = uri,
                                    contentDescription = null,
                                    modifier = Modifier.fillMaxSize(),
                                    contentScale = ContentScale.Crop
                                )
                            }
                        }
                    }
                }
            }
        }
    }
}</code></pre>
